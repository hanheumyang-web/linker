<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKER - 등록</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #F2F2F7; }
        .box { background: white; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #007AFF; color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h3>프로필 등록</h3>
        <input type="text" id="nickname" placeholder="닉네임">
        <input type="number" id="age" placeholder="나이">
        <input type="text" id="job" placeholder="직업">
        <input type="text" id="goal" placeholder="목적">
        <input type="text" id="location" placeholder="지역">
        <input type="text" id="image_url" placeholder="사진 URL (링크)">
        <input type="text" id="tags" placeholder="태그 (예: #운동, #독서)">
        <button id="btn" onclick="save()">등록하기</button>
    </div>

    <script>
        const mySupabaseUrl = 'https://txabwcjvexyalallvndi.supabase.co';
        const mySupabaseKey = 'sb_publishable_FI_UmoSSh1AWGZo2I5Bkjw_5J01mYfP';
        const myDb = window.supabase.createClient(mySupabaseUrl, mySupabaseKey);

        async function save() {
            const btn = document.getElementById('btn');
            const data = {
                nickname: document.getElementById('nickname').value,
                age: parseInt(document.getElementById('age').value),
                job: document.getElementById('job').value,
                goal: document.getElementById('goal').value,
                location: document.getElementById('location').value,
                image_url: document.getElementById('image_url').value,
                tags: document.getElementById('tags').value
            };

            btn.disabled = true;
            btn.innerText = "저장 중...";

            const { error } = await myDb.from('profiles').insert([data]);

            if (error) {
                alert("실패: " + error.message);
                btn.disabled = false;
                btn.innerText = "등록하기";
            } else {
                alert("성공!");
                location.href = "index.html";
            }
        }
    </script>
</body>
</html>
