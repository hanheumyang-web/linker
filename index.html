<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKER - 프라이빗 매칭</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #F2F2F7; --card-bg: #FFFFFF; --text-main: #1D1D1F; --text-sub: #86868B; --accent: #007AFF; --border: #E5E5EA; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; justify-content: center; -webkit-font-smoothing: antialiased; }
        .app-container { width: 100%; max-width: 400px; background: var(--bg-color); min-height: 100vh; position: relative; }
        .header { background: rgba(242, 242, 247, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; padding: 16px; text-align: center; border-bottom: 0.5px solid var(--border); }
        .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }
        
        #feed { padding-top: 16px; padding-bottom: 40px; }

        .feed-card { background: var(--card-bg); border-radius: 16px; margin: 0 16px 16px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
        .feed-header { display: flex; align-items: center; margin-bottom: 16px; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: #E5E5EA; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .user-info { display: flex; flex-direction: column; }
        .nickname { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
        .referrer { font-size: 13px; color: var(--text-sub); margin-top: 2px; }
        
        .photo-wrapper { position: relative; margin-bottom: 8px; }
        .photo-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 8px; margin-bottom: 8px; padding-bottom: 0; cursor: grab; scroll-behavior: smooth; }
        .photo-slider:active { cursor: grabbing; }
        .photo-slider::-webkit-scrollbar { display: none; }
        .photo-slide { flex: 0 0 100%; height: 320px; object-fit: cover; border-radius: 12px; scroll-snap-align: center; pointer-events: none; }
        .photo-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.85); border: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 5; transition: opacity 0.2s; color: #333; }
        .photo-arrow:hover { background: white; }
        .photo-arrow.left { left: 10px; }
        .photo-arrow.right { right: 10px; }
        .photo-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 16px; }
        .photo-dot { width: 7px; height: 7px; border-radius: 50%; background: #D1D1D6; transition: background 0.2s; }
        .photo-dot.active { background: var(--accent); }
        .image-placeholder { width: 100%; height: 320px; background: var(--bg-color); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text-sub); font-size: 13px; margin-bottom: 16px; }
        
        .info-row { font-size: 15px; margin-bottom: 8px; line-height: 1.4; display: flex; }
        .info-label { color: var(--text-sub); width: 80px; font-weight: 500; }
        .tags { margin-top: 16px; margin-bottom: 20px; }
        .tag { display: inline-block; background: var(--bg-color); color: var(--text-main); padding: 6px 10px; border-radius: 8px; font-size: 13px; font-weight: 500; margin: 0 4px 4px 0; }
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:active { opacity: 0.8; }
        .gender-filter { display: flex; gap: 8px; padding: 0 16px; margin-bottom: 16px; }
        .gender-btn { flex: 1; padding: 10px 0; border-radius: 10px; border: 1px solid var(--border); background: white; font-size: 14px; font-weight: 600; color: var(--text-sub); cursor: pointer; text-align: center; font-family: inherit; }
        .gender-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .loading { text-align: center; padding: 40px; color: var(--text-sub); font-size: 15px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; padding: 24px; border-radius: 20px; width: 85%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .modal-desc { font-size: 13px; color: var(--text-sub); margin-bottom: 20px; line-height: 1.4; }
        .modal-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .modal-btn-group { display: flex; gap: 8px; margin-top: 8px; }
        .modal-btn-cancel { flex: 1; padding: 14px; border-radius: 10px; border: none; background: #E5E5EA; color: var(--text-main); font-weight: 600; font-size: 15px; cursor: pointer; }
        .modal-btn-submit { flex: 2; padding: 14px; border-radius: 10px; border: none; background: var(--accent); color: white; font-weight: 600; font-size: 15px; cursor: pointer; }
        .header { display: flex; align-items: center; justify-content: space-between; }
        .shuffle-btn { background: none; border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; color: var(--text-sub); font-weight: 600; }
        .shuffle-btn:active { opacity: 0.7; }
        .pagination { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; padding-bottom: calc(14px + env(safe-area-inset-bottom)); box-shadow: 0 -4px 20px rgba(0,0,0,0.08); z-index: 100; }
        .page-btn { width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border); background: white; font-size: 15px; font-weight: 700; cursor: pointer; color: var(--text-sub); font-family: inherit; display: flex; align-items: center; justify-content: center; }
        .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .page-btn:disabled { opacity: 0.3; cursor: default; }
        .page-arrow { width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border); background: white; font-size: 18px; font-weight: 600; cursor: pointer; color: var(--text-main); font-family: inherit; display: flex; align-items: center; justify-content: center; }
        .page-arrow:disabled { opacity: 0.3; cursor: default; }
        .app-container { padding-bottom: 80px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-title">LINKER</div>
            <button class="shuffle-btn" onclick="shuffleAndRender()">🔀 섞기</button>
        </div>
        <div class="gender-filter">
            <button class="gender-btn active" onclick="filterGender('남성', this)">남성</button>
            <button class="gender-btn" onclick="filterGender('여성', this)">여성</button>
        </div>
        <div id="feed"><div class="loading">데이터를 불러오는 중입니다...</div></div>
    </div>
    <div class="pagination" id="pagination"></div>

    <div class="modal-overlay" id="applyModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTargetName">@상대방 님에게 신청</div>
            <div class="modal-desc">운영자 확인 및 연락을 위해 신청자 본인의 정보와 주선자(지인)의 이름을 정확히 적어주세요.</div>
            
            <input type="text" id="reqMyName" class="modal-input" placeholder="신청자 본인 이름 (예: 홍길동)">
            <input type="text" id="reqMyContact" class="modal-input" placeholder="본인 연락처 (예: 010-1234-5678)">
            <input type="text" id="reqReferrerName" class="modal-input" placeholder="본인을 추천해준 주선자 이름">
            
            <div class="modal-btn-group">
                <button class="modal-btn-cancel" onclick="closeModal()">취소</button>
                <button class="modal-btn-submit" id="submitMatchBtn" onclick="submitMatch()">접수 및 카톡 연결</button>
            </div>
        </div>
    </div>

    <script>
        var mySupabaseUrl = 'https://txabwcjvexyalallvndi.supabase.co';
        var mySupabaseKey = 'sb_publishable_FI_UmoSSh1AWGZo2I5Bkjw_5J01mYfP';
        var myDb = window.supabase.createClient(mySupabaseUrl, mySupabaseKey);

        function sendTelegram(msg) {
            fetch('https://api.telegram.org/bot8714445208:AAHj1eum2VjHr4tjkBKnnAqMxLXQd4zhpr4/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: '8719885101', text: msg })
            });
        }

        var currentTargetNickname = "";
        var allProfiles = [];
        var currentPage = 1;
        var perPage = 5;
        var currentGender = '남성';

        function shuffle(arr) {
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
            }
            return arr;
        }

        function getFiltered() {
            if (currentGender === 'all') return allProfiles;
            return allProfiles.filter(function(p) { return p.gender === currentGender; });
        }

        async function loadProfiles() {
            var feed = document.getElementById('feed');
            var { data: profiles, error } = await myDb.from('profiles').select('*');

            if (error) { feed.innerHTML = '<div class="loading">에러: ' + error.message + '</div>'; return; }
            if (!profiles || profiles.length === 0) { feed.innerHTML = '<div class="loading">아직 등록된 프로필이 없습니다.</div>'; return; }

            allProfiles = shuffle(profiles);
            currentPage = 1;
            renderPage();
        }

        function renderPage() {
            var feed = document.getElementById('feed');
            var filtered = getFiltered();
            var totalPages = Math.ceil(filtered.length / perPage);
            if (currentPage > totalPages) currentPage = 1;
            var start = (currentPage - 1) * perPage;
            var pageProfiles = filtered.slice(start, start + perPage);

            if (filtered.length === 0) { feed.innerHTML = '<div class="loading">해당 성별의 프로필이 없습니다.</div>'; document.getElementById('pagination').innerHTML = ''; return; }

            feed.innerHTML = '';

            pageProfiles.forEach(function(profile) {
                var tagsHtml = (profile.tags || "").split(', ').map(function(tag) { return '<span class="tag">' + tag + '</span>'; }).join('');
                var avatarEmoji = '👤';
                if(profile.nickname.includes('토끼')) avatarEmoji = '🐰';
                else if(profile.nickname.includes('쿼카')) avatarEmoji = '🐻';
                else if(profile.nickname.includes('거북이')) avatarEmoji = '🐢';
                else if(profile.nickname.includes('펭귄')) avatarEmoji = '🐧';
                else if(profile.nickname.includes('사과')) avatarEmoji = '🍎';
                else if(profile.nickname.includes('체리')) avatarEmoji = '🍒';

                var photoHtml = '<div class="image-placeholder">등록된 사진이 없습니다.</div>';
                if (profile.image_url) {
                    var urls = profile.image_url.split(',').filter(function(u) {
                        return u.trim() !== '' && u.trim().startsWith('http');
                    });
                    if (urls.length > 0) {
                        photoHtml = '<div class="photo-wrapper">';
                        photoHtml += '<div class="photo-slider">';
                        urls.forEach(function(url) {
                            photoHtml += '<img src="' + url.trim() + '" class="photo-slide" onerror="this.parentElement.innerHTML=\'<div class=image-placeholder>사진을 불러올 수 없습니다.</div>\'">';
                        });
                        photoHtml += '</div>';
                        if (urls.length > 1) {
                            photoHtml += '<button class="photo-arrow left" onclick="slidePhoto(this,-1)">‹</button>';
                            photoHtml += '<button class="photo-arrow right" onclick="slidePhoto(this,1)">›</button>';
                        }
                        photoHtml += '</div>';
                        if (urls.length > 1) {
                            photoHtml += '<div class="photo-dots">';
                            urls.forEach(function(_, i) { photoHtml += '<div class="photo-dot' + (i === 0 ? ' active' : '') + '"></div>'; });
                            photoHtml += '</div>';
                        }
                    }
                }

                var cardHtml = '<div class="feed-card">' +
                    '<div class="feed-header">' +
                        '<div class="avatar">' + avatarEmoji + '</div>' +
                        '<div class="user-info">' +
                            '<span class="nickname">@' + profile.nickname + '</span>' +
                            '<span class="referrer">📍 지인 추천 완료</span>' +
                        '</div>' +
                    '</div>' +
                    photoHtml +
                    '<div class="info-row"><span class="info-label">나이</span> ' + profile.age + '세</div>' +
                    (profile.height ? '<div class="info-row"><span class="info-label">키</span> ' + profile.height + 'cm</div>' : '') +
                    (profile.mbti ? '<div class="info-row"><span class="info-label">MBTI</span> ' + profile.mbti + '</div>' : '') +
                    '<div class="info-row"><span class="info-label">직장</span> ' + profile.job + '</div>' +
                    '<div class="info-row"><span class="info-label">목적</span> ' + profile.goal + '</div>' +
                    '<div class="info-row"><span class="info-label">위치</span> ' + profile.location + '</div>' +
                    '<div class="tags">' + tagsHtml + '</div>' +
                    '<button class="btn" onclick="openModal(\'' + profile.nickname + '\')">무료 매칭 신청하기 (매칭시 30,000원)</button>' +
                    '</div>';
                feed.innerHTML += cardHtml;
            });

            // 도트 인디케이터 연동
            document.querySelectorAll('.photo-slider').forEach(function(slider) {
                var wrapper = slider.closest('.photo-wrapper');
                var card = wrapper ? wrapper.closest('.feed-card') : null;
                var dots = card ? card.querySelector('.photo-dots') : null;
                if (dots) {
                    slider.addEventListener('scroll', function() {
                        var idx = Math.round(slider.scrollLeft / slider.offsetWidth);
                        dots.querySelectorAll('.photo-dot').forEach(function(d, i) {
                            d.classList.toggle('active', i === idx);
                        });
                    });
                }
            });

            // 페이지네이션 렌더
            var pag = document.getElementById('pagination');
            if (totalPages <= 1) { pag.innerHTML = ''; pag.style.display = 'none'; return; }
            pag.style.display = 'flex';
            var pagHtml = '<button class="page-arrow" onclick="goPage(' + (currentPage - 1) + ')"' + (currentPage === 1 ? ' disabled' : '') + '>‹</button>';
            for (var i = 1; i <= totalPages; i++) {
                pagHtml += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
            }
            pagHtml += '<button class="page-arrow" onclick="goPage(' + (currentPage + 1) + ')"' + (currentPage === totalPages ? ' disabled' : '') + '>›</button>';
            pag.innerHTML = pagHtml;
        }

        window.goPage = function(page) {
            var totalPages = Math.ceil(getFiltered().length / perPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.shuffleAndRender = function() {
            allProfiles = shuffle(allProfiles);
            currentPage = 1;
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.filterGender = function(gender, btnEl) {
            document.querySelectorAll('.gender-btn').forEach(function(b) { b.classList.remove('active'); });
            btnEl.classList.add('active');
            currentGender = gender;
            currentPage = 1;
            renderPage();
        };

        window.slidePhoto = function(btn, dir) {
            var wrapper = btn.closest('.photo-wrapper');
            var slider = wrapper.querySelector('.photo-slider');
            slider.scrollBy({ left: slider.offsetWidth * dir, behavior: 'smooth' });
        };

        window.openModal = function(targetNickname) {
            currentTargetNickname = targetNickname;
            document.getElementById('modalTargetName').innerText = "@" + targetNickname + " 님에게 신청";
            document.getElementById('applyModal').style.display = 'flex';
        };

        window.closeModal = function() {
            document.getElementById('applyModal').style.display = 'none';
        };

        // 🚀 제출 시 접수 번호 생성 & 카톡 문구 복사
        window.submitMatch = async function() {
            var myName = document.getElementById('reqMyName').value;
            var myContact = document.getElementById('reqMyContact').value;
            var refName = document.getElementById('reqReferrerName').value;

            if(!myName || !myContact || !refName) {
                alert("정보를 모두 입력해주세요!");
                return;
            }

            var btn = document.getElementById('submitMatchBtn');
            btn.disabled = true;
            btn.innerText = "접수 번호 생성 중...";

            // 랜덤 4자리 티켓 번호 생성 (예: #7392)
            var ticketNumber = "#" + Math.floor(1000 + Math.random() * 9000);

            // DB에 티켓 번호까지 같이 저장
            var { error } = await myDb.from('match_requests').insert([{
                target_nickname: currentTargetNickname,
                requester_my_name: myName.trim(),
                requester_my_contact: myContact.trim(),
                requester_referrer_name: refName.trim(),
                requester_referrer_contact: "카톡방확인",
                ticket_number: ticketNumber 
            }]);

            if (error) {
                alert("신청 실패: " + error.message);
                btn.disabled = false;
                btn.innerText = "접수 및 카톡 연결";
            } else {
                sendTelegram("🔔 새 매칭 신청!\n\n접수번호: " + ticketNumber + "\n신청자: " + myName.trim() + "\n대상: @" + currentTargetNickname + "\n주선자: " + refName.trim());

                alert("✅ 매칭 신청 완료!\n\n접수번호: " + ticketNumber + "\n\n운영자 확인 후 빠르게 안내드리겠습니다.\n잠시만 기다려주세요!");

                closeModal();
                btn.disabled = false;
                btn.innerText = "접수 및 카톡 연결";
                document.getElementById('reqMyName').value = "";
                document.getElementById('reqMyContact').value = "";
                document.getElementById('reqReferrerName').value = "";
            }
        };

        // 스와이프 제스처 (모바일 + PC 드래그)
        (function() {
            var feed = document.getElementById('feed');
            var startX = 0, startY = 0, isDragging = false;
            feed.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, { passive: true });
            feed.addEventListener('touchend', function(e) {
                var dx = e.changedTouches[0].clientX - startX;
                var dy = e.changedTouches[0].clientY - startY;
                if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
                    var total = Math.ceil(getFiltered().length / perPage);
                    if (dx < 0 && currentPage < total) goPage(currentPage + 1);
                    else if (dx > 0 && currentPage > 1) goPage(currentPage - 1);
                }
            });
            feed.addEventListener('mousedown', function(e) { startX = e.clientX; isDragging = true; });
            feed.addEventListener('mouseup', function(e) {
                if (!isDragging) return;
                isDragging = false;
                var dx = e.clientX - startX;
                if (Math.abs(dx) > 80) {
                    var total = Math.ceil(getFiltered().length / perPage);
                    if (dx < 0 && currentPage < total) goPage(currentPage + 1);
                    else if (dx > 0 && currentPage > 1) goPage(currentPage - 1);
                }
            });
        })();

        window.onload = loadProfiles;
    </script>
</body>
</html>
