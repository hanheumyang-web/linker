<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #F2F2F7; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; max-width: 400px; margin-left: auto; margin-right: auto; }
        .profile-img { width: 100%; border-radius: 10px; margin-bottom: 10px; display: block; }
        .placeholder { width: 100%; height: 200px; background: #eee; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #888; margin-bottom: 10px; }
        h4 { margin: 10px 0; }
        .tag { display: inline-block; background: #E5E5EA; padding: 5px 10px; border-radius: 5px; font-size: 12px; margin-right: 5px; }
        .btn { width: 100%; padding: 15px; background: #007AFF; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="feed"></div>

    <script>
        const mySupabaseUrl = 'https://txabwcjvexyalallvndi.supabase.co';
        const mySupabaseKey = 'sb_publishable_FI_UmoSSh1AWGZo2I5Bkjw_5J01mYfP';
        const myDb = window.supabase.createClient(mySupabaseUrl, mySupabaseKey);

        async function load() {
            const { data: profiles, error } = await myDb.from('profiles').select('*').order('created_at', { ascending: false });
            if (error) return;

            const feed = document.getElementById('feed');
            feed.innerHTML = '';

            profiles.forEach(p => {
                // 사진 주소가 있으면 img, 없으면 회색 박스
                const img = p.image_url ? `<img src="${p.image_url}" class="profile-img">` : `<div class="placeholder">사진 없음</div>`;
                
                feed.innerHTML += `
                    <div class="card">
                        ${img}
                        <h4>@${p.nickname} (${p.age}세)</h4>
                        <p>${p.job} | ${p.location}</p>
                        <p><b>목적:</b> ${p.goal}</p>
                        <div>${(p.tags || "").split(',').map(t => `<span class="tag">${t}</span>`).join('')}</div>
                        <button class="btn" onclick="location.href='https://open.kakao.com/o/suwVPTmi'">매칭 신청하기</button>
                    </div>
                `;
            });
        }
        load();
    </script>
</body>
</html>
