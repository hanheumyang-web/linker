<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKER - 관리자 대시보드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #F2F4F6; margin: 0; padding: 20px; color: #191F28; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { margin-bottom: 20px; font-size: 24px; display: flex; align-items: center; justify-content: space-between; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #3182F6; }
        .info-box { flex: 1; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-bottom: 8px; }
        .badge-requester { background: #E8F3FF; color: #3182F6; }
        .badge-target { background: #FFF4E6; color: #F08C00; }
        .row { margin-bottom: 6px; font-size: 14px; }
        .row strong { display: inline-block; width: 60px; color: #4E5968; }
        .vs { font-size: 20px; font-weight: bold; color: #C6C6C8; margin: 0 30px; }
        .status-btn { background: #3182F6; color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container" id="adminPanel" style="display: none;">
        <h1>👑 LINKER 매칭 현황 대시보드 <button onclick="loadRequests()" style="font-size:14px; padding:6px 12px;">새로고침</button></h1>
        <div id="requestList">로딩 중...</div>
    </div>

    <script>
        // 🔒 간단한 비밀번호 보안 (원하는 대로 변경해)
        if(prompt("관리자 비밀번호를 입력하세요:") !== "7498") {
            alert("비밀번호가 틀렸습니다.");
            document.body.innerHTML = "접근 거부됨";
        } else {
            document.getElementById('adminPanel').style.display = 'block';
        }

        var mySupabaseUrl = 'https://txabwcjvexyalallvndi.supabase.co';
        var mySupabaseKey = 'sb_publishable_FI_UmoSSh1AWGZo2I5Bkjw_5J01mYfP';
        var myDb = window.supabase.createClient(mySupabaseUrl, mySupabaseKey);

        async function loadRequests() {
            var list = document.getElementById('requestList');
            list.innerHTML = '데이터를 불러오는 중...';

            // 매칭 신청 내역 가져오기
            var { data: requests, error: reqErr } = await myDb.from('match_requests').select('*').order('created_at', { ascending: false });
            // 전체 프로필(타겟의 주선자 정보를 찾기 위해) 가져오기
            var { data: profiles, error: profErr } = await myDb.from('profiles').select('*');

            if (reqErr || profErr) { list.innerHTML = '에러 발생!'; return; }
            if (requests.length === 0) { list.innerHTML = '아직 들어온 매칭 신청이 없습니다.'; return; }

            list.innerHTML = '';

            requests.forEach(function(req) {
                // 신청받은 타겟 프로필 찾기
                var targetProfile = profiles.find(p => p.nickname === req.target_nickname) || {};
                var targetReferrerName = targetProfile.referrer_name || "알 수 없음";
                var targetReferrerContact = targetProfile.referrer_contact || "알 수 없음";

                var card = `
                    <div class="card">
                        <div class="info-box">
                            <div class="badge badge-requester">🙋‍♂️ 신청자 측 주선자</div>
                            <div class="row"><strong>이름</strong> ${req.requester_referrer_name}</div>
                            <div class="row"><strong>연락처</strong> ${req.requester_referrer_contact}</div>
                            <div class="row" style="color:#8B95A1; font-size:12px; margin-top:8px;">신청시간: ${new Date(req.created_at).toLocaleString()}</div>
                        </div>
                        
                        <div class="vs">▶️ 신청 ▶️</div>

                        <div class="info-box">
                            <div class="badge badge-target">🎯 지목받은 상대방: @${req.target_nickname}</div>
                            <div class="row"><strong>주선자</strong> ${targetReferrerName}</div>
                            <div class="row"><strong>연락처</strong> ${targetReferrerContact}</div>
                        </div>
                    </div>
                `;
                list.innerHTML += card;
            });
        }

        window.onload = loadRequests;
    </script>
</body>
</html>
